# ============================================================
# Camunda Platform 8 — Docker Compose (Self-Hosted)
# Basiert auf der offiziellen Camunda Docker Compose Konfiguration
# Dokumentation: https://docs.camunda.io/docs/self-managed/setup/deploy/local/docker-compose/
# ============================================================

services:

  # ── Zeebe (Workflow Engine) ──────────────────────────────
  zeebe:
    image: camunda/zeebe:8.6.5
    container_name: zeebe
    ports:
      - "26500:26500"   # Gateway API
      - "9600:9600"     # Monitoring
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - zeebe_data:/usr/local/zeebe/data
    networks:
      - camunda-platform
    restart: unless-stopped

  # ── Operate (Prozess-Monitoring) ─────────────────────────
  operate:
    image: camunda/operate:8.6.5
    container_name: operate
    ports:
      - "8081:8080"
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - SPRING_PROFILES_ACTIVE=dev-data
      - CAMUNDA_OPERATE_AUTH_ENABLED=false
    depends_on:
      zeebe:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - camunda-platform
    restart: unless-stopped

  # ── Tasklist (Aufgabenverwaltung) ────────────────────────
  tasklist:
    image: camunda/tasklist:8.6.5
    container_name: tasklist
    ports:
      - "8082:8080"
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - SPRING_PROFILES_ACTIVE=dev-data
      - CAMUNDA_TASKLIST_AUTH_ENABLED=false
    depends_on:
      zeebe:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - camunda-platform
    restart: unless-stopped

  # ── Connectors ───────────────────────────────────────────
  connectors:
    image: camunda/connectors-bundle:8.6.4
    container_name: connectors
    ports:
      - "8085:8080"
    environment:
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true
      - CAMUNDA_OPERATE_CLIENT_URL=http://operate:8080
    depends_on:
      zeebe:
        condition: service_started
      operate:
        condition: service_started
    networks:
      - camunda-platform
    restart: unless-stopped

  # ── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - action.destructive_requires_name=false
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - camunda-platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  zeebe_data:
  elastic_data:

networks:
  camunda-platform:
    driver: bridge
